name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore OCRWeb.slnx

      - name: Build
        run: dotnet build OCRWeb.slnx --no-restore -c Release

      - name: Test
        run: dotnet test OCRWeb.slnx --no-build -c Release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontend/OCRWeb.Frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"
          cache-dependency-path: src/Frontend/OCRWeb.Frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
